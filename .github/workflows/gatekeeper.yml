name: "DataOps: PR Blast Radius Gatekeeper"

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**/*.sql"
      - "models/**/*.sql"
      - "dbt_project.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  assess-blast-radius:
    name: "Analyze Downstream Lineage and Enforce Constraints"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Isolate Changed SQL Files
        id: changed-files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path' | grep -E '\.sql$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Setup Python Runtime Environment
        if: steps.changed-files.outputs.files != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python Dependencies
        if: steps.changed-files.outputs.files != ''
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          pip install "openmetadata-ingestion~=1.12.0" cachetools

      - name: Execute Lineage Assessment Script
        if: steps.changed-files.outputs.files != ''
        id: gatekeeper_check
        env:
          OPENMETADATA_HOST: ${{ secrets.OPENMETADATA_HOST }}
          OPENMETADATA_JWT_TOKEN: ${{ secrets.OPENMETADATA_JWT_TOKEN }}
          FILES: ${{ steps.changed-files.outputs.files }}
        run: |
          set -euo pipefail
          impact=false
          processed=0
          : > combined_report.md

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            # Ignore deleted/moved-out files that no longer exist in checkout.
            if [[ ! -f "$file" ]]; then
              echo "Skipping non-existent SQL file: $file"
              continue
            fi

            echo "Running gatekeeper for: $file"
            set +e
            python main.py --sql-file "$file"
            status=$?
            set -e

            processed=$((processed + 1))
            echo "### File: \`$file\`" >> combined_report.md
            if [[ -f report.md ]]; then
              cat report.md >> combined_report.md
              echo "" >> combined_report.md
            else
              echo "_No report generated by gatekeeper._" >> combined_report.md
              echo "" >> combined_report.md
            fi

            if [[ $status -eq 100 ]]; then
              impact=true
            elif [[ $status -ne 0 ]]; then
              echo "Gatekeeper failed for $file with exit code $status"
              echo "### Blast Radius Assessment Failed" > report.md
              echo "" >> report.md
              echo "Gatekeeper execution failed for \`$file\` with exit code $status." >> report.md
              exit $status
            fi
          done <<< "$FILES"

          if [[ $processed -eq 0 ]]; then
            echo "### Blast Radius Assessment Passed" > report.md
            echo "" >> report.md
            echo "No analyzable SQL files were found in this pull request." >> report.md
            echo "impact=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mv combined_report.md report.md
          echo "impact=$impact" >> "$GITHUB_OUTPUT"

      - name: Auto-Remediate Blast Radius
        if: steps.gatekeeper_check.outputs.impact == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENMETADATA_HOST: ${{ secrets.OPENMETADATA_HOST }}
          OPENMETADATA_JWT_TOKEN: ${{ secrets.OPENMETADATA_JWT_TOKEN }}
          ENV_MODE: "production"
        run: python remediation_agent.py

      - name: Post PR Comment and Enforce Merge Block
        if: steps.changed-files.outputs.files != '' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [[ -f report.md ]]; then
            gh pr comment "$PR_NUMBER" --body-file report.md --edit-last --create-if-none
          fi

          if [[ "${{ steps.gatekeeper_check.outputs.impact }}" == "true" ]]; then
            echo "CRITICAL ERROR: High-risk downstream assets detected in the blast radius."
            echo "Merge sequence blocked. Please review the PR comments."
            exit 1
          fi

      - name: Send Slack Alert
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 *CRITICAL DATAOPS ALERT* 🚨\nDestructive schema change detected in PR #${{ github.event.pull_request.number }}.\nAuto-Medic has intercepted the PR and posted a zero-downtime remediation patch.\n🔗 Review it here: ${{ github.event.pull_request.html_url }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
